<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メインメニュー - テストアプリ</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            margin-bottom: 24px;
            font-size: 24px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 32px;
        }
        @media (min-width: 600px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            /* 3つ目のアイテムを中央に配置するための調整 */
            .menu-item:last-child:nth-child(odd) {
                grid-column: span 2;
            }
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px;
            text-decoration: none;
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            text-align: left;
            transition: transform 0.2s, background-color 0.2s;
        }
        .menu-item:hover {
            background-color: #f8f9ff;
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }
        .menu-icon {
            font-size: 32px;
            background: var(--bg-color);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .menu-text {
            flex: 1;
        }
        .menu-title {
            display: block;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 4px;
        }
        .menu-desc {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.4;
        }
        .version-badge { position: absolute; top: 10px; right: 20px; font-size: 12px; color: var(--text-muted); font-weight: 500; }
    </style>
</head>
<body>
    <div class="version-badge">Mark-2</div>
    <div class="container">
        <h1>テストアプリ</h1>
        <div class="menu-grid">
            <a href="{{ url_for('search') }}" class="menu-item">
                <div class="menu-icon">🔍</div>
                <div class="menu-text">
                    <span class="menu-title">データを検索</span>
                    <span class="menu-desc">登録された情報をキーワードで素早く探し出します</span>
                </div>
            </a>
            <a href="{{ url_for('add') }}" class="menu-item">
                <div class="menu-icon">➕</div>
                <div class="menu-text">
                    <span class="menu-title">データを追加</span>
                    <span class="menu-desc">新しい名前とメモをデータベースに登録します</span>
                </div>
            </a>
            <a href="{{ url_for('all_items') }}" class="menu-item">
                <div class="menu-icon">📋</div>
                <div class="menu-text">
                    <span class="menu-title">全データを表示</span>
                    <span class="menu-desc">現在登録されているすべての情報を一覧で確認します</span>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
