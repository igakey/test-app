<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>データ編集 - テストアプリ</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --border-color: #e5e7eb;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container { width: 100%; max-width: 500px; background: var(--card-bg); padding: 32px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        h1 { text-align: center; margin-bottom: 24px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        button { width: 100%; background-color: var(--primary-color); color: white; padding: 12px; font-size: 16px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: background-color 0.2s; }
        button:hover { background-color: var(--primary-hover); }
        .message { padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        .success { background: #ecfdf5; color: #065f46; }
        .error { background: #fef2f2; color: #991b1b; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--primary-color); text-decoration: none; font-weight: 500; }
        .version-badge { position: absolute; top: 10px; right: 20px; font-size: 12px; color: var(--text-main); opacity: 0.6; font-weight: 500; }
    </style>
</head>
<body>
    <div class="version-badge">Mark-2</div>
    <div class="container">
        <h1>データ編集 (No: {{ item.no }})</h1>

        {% if success_message %}
            <div class="message success">{{ success_message }}</div>
        {% endif %}
        {% if error_message %}
            <div class="message error">{{ error_message }}</div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="name">名前</label>
                <input type="text" id="name" name="name" value="{{ item.name }}" required>
            </div>
            <div class="form-group">
                <label for="memo">メモ</label>
                <textarea id="memo" name="memo">{{ item.memo }}</textarea>
            </div>
            <div class="form-group">
                <label for="image">イメージ（変更する場合のみ選択）</label>
                {% if item.image_filename %}
                    <div style="margin-bottom: 10px;">
                        <img src="{{ url_for('static', filename='uploads/' + item.image_filename) }}" alt="current image" style="max-width: 100px; border-radius: 4px;">
                    </div>
                {% endif %}
                <input type="file" id="image" name="image" accept="image/*">
            </div>
            <button type="submit">更新を保存する</button>
        </form>

        <a href="{{ url_for('all_items') }}" class="back-link">← 一覧へ戻る</a>
    </div>
</body>
</html>
